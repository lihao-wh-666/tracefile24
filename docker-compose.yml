services:
  mysql:
    image: mysql:8.0
    container_name: hot-event-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-hot_event_db}
      MYSQL_USER: ${DB_USERNAME:-hotevent}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hotevent123}
      LANG: C.UTF-8
      TZ: Asia/Shanghai
    ports:
      - "${DB_HOST_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --init-connect=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123456}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - hot-event-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hot-event-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-hot_event_db}
      DB_USERNAME: ${DB_USERNAME:-hotevent}
      DB_PASSWORD: ${DB_PASSWORD:-hotevent123}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-9090}:9090"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config
    networks:
      - hot-event-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hot-event-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9080}:9080"
    networks:
      - hot-event-network

volumes:
  mysql_data:

networks:
  hot-event-network:
    driver: bridge
